<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal de Proveedores - Agronat</title>
<style>
  :root {
    --verde:         #4A8B80;
    --verde-oscuro:  #2D6960;
    --verde-claro:   #EBF5F3;
    --naranja:       #E8922A;
    --naranja-claro: #FEF6EC;
    --gris-fondo:    #F4F7F6;
    --gris-borde:    #DDE8E5;
    --blanco:        #FFFFFF;
    --texto:         #1E3532;
    --texto-suave:   #5D7E79;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, Helvetica, sans-serif;
    background: var(--gris-fondo);
    color: var(--texto);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--blanco);
    border-bottom: 3px solid var(--verde);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 68px;
  }
  .header-logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .header-logo img { height: 38px; display: block; }
  .header-divider { width: 1px; height: 32px; background: var(--gris-borde); }
  .header-titulo { font-size: 16px; font-weight: bold; color: var(--verde); letter-spacing: 0.02em; }
  .header-subtitulo { font-size: 11px; color: var(--texto-suave); margin-top: 1px; }

  /* ── LAYOUT ── */
  main { max-width: 680px; margin: 0 auto; padding: 32px 16px; }

  .tarjeta {
    background: var(--blanco);
    border-radius: 8px;
    padding: 28px;
    box-shadow: 0 1px 4px rgba(45,105,96,0.08);
    margin-bottom: 16px;
    border: 1px solid var(--gris-borde);
  }

  /* ── LOGIN ── */
  .login-titulo {
    font-size: 20px;
    font-weight: bold;
    color: var(--verde);
    margin-bottom: 6px;
  }
  .login-subtitulo {
    font-size: 13px;
    color: var(--texto-suave);
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: bold;
    color: var(--texto-suave);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-top: 14px;
    margin-bottom: 5px;
  }
  input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--gris-borde);
    border-radius: 5px;
    font-size: 15px;
    color: var(--texto);
    transition: border-color 0.15s;
  }
  input:focus {
    outline: none;
    border-color: var(--verde);
    box-shadow: 0 0 0 3px rgba(74,139,128,0.12);
  }

  /* ── BOTONES ── */
  .btn-principal {
    margin-top: 20px;
    background: var(--verde);
    color: var(--blanco);
    border: none;
    padding: 12px 20px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
    transition: background 0.15s;
  }
  .btn-principal:hover { background: var(--verde-oscuro); }
  .btn-secundario {
    background: var(--gris-fondo);
    color: var(--texto);
    border: 1px solid var(--gris-borde);
    padding: 7px 14px;
    border-radius: 5px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-secundario:hover { background: var(--verde-claro); }

  /* ── AVISOS ── */
  .aviso {
    padding: 10px 14px;
    border-radius: 6px;
    font-size: 13px;
    margin-top: 12px;
    border-left: 4px solid;
  }
  .aviso.error { background: #FEF0EC; border-color: #E05A35; color: #7B2210; }
  .aviso.info  { background: var(--verde-claro); border-color: var(--verde); color: var(--verde-oscuro); }

  /* ── PORTAL LOGUEADO ── */
  .barra-usuario {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .barra-usuario .saludo {
    font-size: 14px;
    color: var(--texto-suave);
  }
  .barra-usuario .saludo b { color: var(--verde); }

  .productos {
    display: flex;
    gap: 10px;
    margin: 14px 0;
  }
  .productos button {
    flex: 1;
    padding: 12px 10px;
    border: 2px solid var(--gris-borde);
    background: var(--blanco);
    border-radius: 6px;
    font-size: 13px;
    font-weight: bold;
    color: var(--texto-suave);
    cursor: pointer;
    transition: all 0.15s;
  }
  .productos button:hover { border-color: var(--verde); color: var(--verde); }
  .productos button.activo {
    background: var(--naranja);
    border-color: var(--naranja);
    color: var(--blanco);
  }

  /* ── FILTROS ── */
  .filtros {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 12px;
    align-items: end;
    margin-bottom: 16px;
  }
  .filtros .btn-principal { margin-top: 0; }

  /* ── TABLA ── */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    background: var(--verde);
    color: var(--blanco);
    padding: 9px 10px;
    text-align: left;
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 0.03em;
  }
  td { padding: 9px 10px; border-bottom: 1px solid var(--gris-borde); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--verde-claro); }

  .seccion-label {
    font-size: 11px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--texto-suave);
    margin-bottom: 10px;
  }

  @media (max-width: 600px) {
    .filtros { grid-template-columns: 1fr; }
    header { height: auto; padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-logo">
    <img src="./logo.png" alt="Agronat">
    <div class="header-divider"></div>
    <div>
      <div class="header-titulo">Portal de Proveedores</div>
      <div class="header-subtitulo">Control de Calidad · Agronat</div>
    </div>
  </div>
</header>

<main>

  <!-- ===================== LOGIN ===================== -->
  <div id="panelLogin" class="tarjeta">
    <div class="login-titulo">Ingresar</div>
    <div class="login-subtitulo">Accede a los analisis de calidad de tus entregas</div>
    <label>Usuario</label>
    <input type="text" id="campoUsuario" autocomplete="username">
    <label>Contrasena</label>
    <input type="password" id="campoPassword" autocomplete="current-password">
    <button class="btn-principal" onclick="iniciarSesion()">Ingresar</button>
    <div id="avisoLogin"></div>
  </div>

  <!-- ===================== PORTAL (logueado) ===================== -->
  <div id="panelPortal" style="display:none;">
    <div class="tarjeta barra-usuario">
      <span class="saludo">Hola, <b id="nombreProveedor"></b></span>
      <button class="btn-secundario" onclick="cerrarSesionUsuario()">Cerrar sesion</button>
    </div>

    <div class="tarjeta">
      <p class="seccion-label">Elegi el producto</p>
      <div class="productos" id="botonesProducto"></div>

      <div class="filtros">
        <div>
          <label>Desde</label>
          <input type="date" id="filtroDesde">
        </div>
        <div>
          <label>Hasta</label>
          <input type="date" id="filtroHasta">
        </div>
        <div>
          <button class="btn-principal" onclick="buscarMisAnalisis()">Buscar</button>
        </div>
      </div>

      <div id="resultados">
        <p style="color:var(--texto-suave);">Elegi un producto y presiona Buscar.</p>
      </div>
    </div>
  </div>

</main>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbyj9BXuVUwB09Kc5opWxuBysGokv5xtWS84sTDxvkfOO6YeX8Y3bniz-jfbF4FqhvEq/exec';
const PRODUCTOS = ['Soja', 'Maiz'];
let productoActivo = null;

function guardarSesion(token, proveedor) {
  sessionStorage.setItem('qc_token', token);
  sessionStorage.setItem('qc_proveedor', proveedor);
}
function obtenerToken() { return sessionStorage.getItem('qc_token'); }
function obtenerProveedor() { return sessionStorage.getItem('qc_proveedor'); }
function borrarSesion() {
  sessionStorage.removeItem('qc_token');
  sessionStorage.removeItem('qc_proveedor');
}

window.addEventListener('DOMContentLoaded', () => {
  if (obtenerToken()) mostrarPortal();
  renderBotonesProducto();
  document.getElementById('campoPassword').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') iniciarSesion();
  });
});

async function iniciarSesion() {
  const usuario = document.getElementById('campoUsuario').value.trim();
  const password = document.getElementById('campoPassword').value;
  const aviso = document.getElementById('avisoLogin');
  aviso.innerHTML = '';
  if (!usuario || !password) {
    aviso.innerHTML = '<div class="aviso error">Completa usuario y contrasena.</div>';
    return;
  }
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ accion: 'login', usuario: usuario, password: password })
    });
    const data = await res.json();
    if (data.ok) {
      guardarSesion(data.token, data.proveedor);
      document.getElementById('campoPassword').value = '';
      mostrarPortal();
    } else {
      aviso.innerHTML = '<div class="aviso error">' + data.error + '</div>';
    }
  } catch (e) {
    aviso.innerHTML = '<div class="aviso error">No se pudo conectar. Intenta de nuevo en un momento.</div>';
  }
}

function mostrarPortal() {
  document.getElementById('panelLogin').style.display = 'none';
  document.getElementById('panelPortal').style.display = 'block';
  document.getElementById('nombreProveedor').textContent = obtenerProveedor();
}

async function cerrarSesionUsuario() {
  const token = obtenerToken();
  borrarSesion();
  document.getElementById('panelPortal').style.display = 'none';
  document.getElementById('panelLogin').style.display = 'block';
  document.getElementById('campoUsuario').value = '';
  document.getElementById('resultados').innerHTML = '<p style="color:var(--texto-suave);">Elegi un producto y presiona Buscar.</p>';
  productoActivo = null;
  try {
    await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ accion: 'logout', token: token })
    });
  } catch (e) {}
}

function renderBotonesProducto() {
  const cont = document.getElementById('botonesProducto');
  cont.innerHTML = '';
  PRODUCTOS.forEach(p => {
    const btn = document.createElement('button');
    btn.textContent = p;
    btn.onclick = () => {
      productoActivo = p;
      [...cont.children].forEach(b => b.classList.remove('activo'));
      btn.classList.add('activo');
    };
    cont.appendChild(btn);
  });
}

async function buscarMisAnalisis() {
  const cont = document.getElementById('resultados');
  if (!productoActivo) {
    cont.innerHTML = '<p style="color:var(--texto-suave);">Elegi un producto primero.</p>';
    return;
  }
  const token = obtenerToken();
  if (!token) { cerrarSesionUsuario(); return; }
  cont.innerHTML = '<p style="color:var(--texto-suave);">Buscando...</p>';
  const desde = document.getElementById('filtroDesde').value;
  const hasta = document.getElementById('filtroHasta').value;
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ accion: 'portalListar', token: token, producto: productoActivo, filtros: { desde: desde, hasta: hasta } })
    });
    const data = await res.json();
    if (!data.ok) {
      if (data.error && data.error.indexOf('sesion') !== -1) { cerrarSesionUsuario(); return; }
      cont.innerHTML = '<div class="aviso error">' + data.error + '</div>';
      return;
    }
    renderTabla(data.registros);
  } catch (e) {
    cont.innerHTML = '<div class="aviso error">No se pudo conectar con el servidor.</div>';
  }
}

function renderTabla(registros) {
  const cont = document.getElementById('resultados');
  if (registros.length === 0) {
    cont.innerHTML = '<p style="color:var(--texto-suave);">No se encontraron analisis con esos filtros.</p>';
    return;
  }
  let html = '<table><tr><th>Fecha</th><th>Nro. Orden</th><th>Lote</th><th>PDF</th></tr>';
  registros.forEach(r => {
    html += '<tr><td>' + r.fecha + '</td><td>' + (r.ordenCompraVenta || '-') + '</td><td>' + (r.lote || '-') + '</td><td><button class="btn-secundario" onclick="descargarMiPDF(\'' + r.id + '\')">Descargar</button></td></tr>';
  });
  html += '</table>';
  cont.innerHTML = html;
}

async function descargarMiPDF(id) {
  const token = obtenerToken();
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ accion: 'portalPDF', token: token, producto: productoActivo, id: id })
    });
    const data = await res.json();
    if (!data.ok) { alert('No se pudo descargar el PDF: ' + data.error); return; }
    const bytes = atob(data.base64);
    const arr = new Uint8Array(bytes.length);
    for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
    const blob = new Blob([arr], { type: 'application/pdf' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = data.nombreArchivo;
    link.click();
  } catch (e) {
    alert('Error al descargar el PDF.');
  }
}
</script>
</body>
</html>
